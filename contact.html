<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Contact | Dadapeer</title>

    <!-- GOOGLE FONT -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CONTACT CSS -->

    <link rel="stylesheet"
          href="contact.css">

</head>

<body>

    <!-- BACKGROUND GLOW -->

    <div class="background-glow"></div>

    <!-- MAIN CONTAINER -->

    <div class="contact-container">

        <!-- TOP BAR -->

        <header class="top-bar">

            <a href="index.html"
               class="back-btn">

                <i class="fa-solid fa-arrow-left"></i>

                Back

            </a>

            <h1>
                Contact Me
            </h1>

        </header>

        <!-- CONTACT CONTENT -->

        <div class="contact-content">

            <!-- LEFT SIDE -->

            <div class="contact-info">

                <h2>
                    Build Something Amazing Together
                </h2>

                <p>
                    Open for collaborations, internships, freelance opportunities,
                    and innovative technology projects.
                </p>

                <!-- EMAIL -->

                <div class="info-card">

                    <div class="icon-box">
                        <i class="fa-solid fa-envelope"></i>
                    </div>

                    <div>

                        <h3>Email</h3>

                        <span>
                            dadapeer09012005@gmail.com
                        </span>

                    </div>

                </div>

                <!-- GITHUB -->

                <div class="info-card">

                    <div class="icon-box">
                        <i class="fa-brands fa-github"></i>
                    </div>

                    <div>

                        <h3>GitHub</h3>

                        <span>
                            github.com/Dadapeer-source
                        </span>

                    </div>

                </div>

                <!-- LOCATION -->

                <div class="info-card">

                    <div class="icon-box">
                        <i class="fa-solid fa-location-dot"></i>
                    </div>

                    <div>

                        <h3>Location</h3>

                        <span>
                            Karnataka, India
                        </span>

                    </div>

                </div>

            </div>

            <!-- RIGHT SIDE -->

            <div class="contact-card">

                <h2>
                    Send Message
                </h2>

                <form id="mailForm">

                    <input type="email"
                           id="fromEmail"
                           placeholder="Your Email"
                           required>

                    <input type="text"
                           id="subject"
                           placeholder="Subject"
                           required>

                    <textarea id="message"
                              rows="6"
                              placeholder="Write your message..."
                              required></textarea>

                    <button type="submit">

                        <i class="fa-solid fa-paper-plane"></i>

                        Send Message

                    </button>

                </form>

            </div>

        </div>

    </div>

    <!-- EMAILJS -->

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("CrN72MucBPdOw-ZFc");

const form = document.getElementById("mailForm");

form.addEventListener("submit", function(event) {

    event.preventDefault();

    const email = document.getElementById("fromEmail").value;

    const title = document.getElementById("subject").value;

    const message = document.getElementById("message").value;

    emailjs.send(
        "service_6kur9m7",
        "template_ssud3oa",
        {
            email: email,
            title: title,
            message: message
        }
    )

    .then(function() {

        alert("✅ Message Sent Successfully!");

        form.reset();

    })

    .catch(function(error) {

        alert("❌ Failed to Send Message");

        console.log(error);

    });

});

</script>

</body>

</html>
